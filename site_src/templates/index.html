<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="generator" content="site_src/build.py">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&amp;family=Roboto+Mono&amp;family=Roboto:wght@400;700&amp;display=swap">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&amp;family=Roboto+Mono&amp;family=Roboto:wght@400;700&amp;display=swap" media="print" onload="this.media='all'">
  <meta name="author" content="{{author}}">
  <meta name="description" content="{{description}}">
  <link rel="alternate" hreflang="en-us" href="{{base_url}}/">
  <meta name="theme-color" content="{{theme_color}}">
  <link rel="stylesheet" href="/css/vendor-bundle.min.f1ecf783c14edc00c9320c205831ad8e.css" media="print" onload="this.media='all'">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
  <link rel="stylesheet" href="/css/wowchemy.3baff041d73368960b27aeb45d63008f.css">
  <link rel="stylesheet" href="/css/custom-fix.css">
  <link rel="manifest" href="{{manifest}}">
  <link rel="icon" type="image/svg+xml" href="{{favicon_svg}}">
  <link rel="icon" type="image/png" href="{{favicon}}">
  <link rel="apple-touch-icon" type="image/png" sizes="192x192" href="{{apple_touch_icon}}">
  <link rel="canonical" href="{{base_url}}/">
  <meta property="twitter:card" content="summary">
  <meta property="og:site_name" content="{{title}}">
  <meta property="og:url" content="{{base_url}}/">
  <meta property="og:title" content="{{title}}">
  <meta property="og:description" content="{{description}}">
  <meta property="og:image" content="{{base_url}}{{avatar}}">
  <meta property="twitter:image" content="{{base_url}}{{avatar}}">
  <meta property="og:locale" content="en-us">
  <title>{{title}}</title>
</head>
<body id="top" data-spy="scroll" data-offset="70" data-target="#navbar-main" class="page-wrapper">
  <script src="/js/wowchemy-init.min.8f76bdc9e086322ed5147724ebba3d06.js"></script>

  <div class="page-header">
    <nav class="navbar navbar-expand-lg navbar-light compensate-for-scrollbar" id="navbar-main">
      <div class="container-xl">
        <div class="d-none d-lg-inline-flex">
          <a class="navbar-brand" href="/">{{title}}</a>
        </div>

        <button type="button" class="navbar-toggler" data-toggle="collapse"
                data-target="#navbar-content" aria-controls="navbar-content" aria-expanded="false" aria-label="Toggle navigation">
          <span><i class="fas fa-bars"></i></span>
        </button>

        <div class="navbar-brand-mobile-wrapper d-inline-flex d-lg-none">
          <a class="navbar-brand" href="/">{{title}}</a>
        </div>

        <div class="navbar-collapse main-menu-item collapse justify-content-start" id="navbar-content">
          <ul class="navbar-nav d-md-inline-flex">
{{nav_items}}
          </ul>
        </div>

        <ul class="nav-icons navbar-nav flex-row ml-auto d-flex pl-md-2">
          <li class="nav-item dropdown theme-dropdown">
            <a href="#" class="nav-link" data-toggle="dropdown" aria-haspopup="true" aria-label="Display preferences">
              <i class="fas fa-moon" aria-hidden="true"></i>
            </a>
            <div class="dropdown-menu">
              <a href="#" class="dropdown-item js-set-theme-light"><span>Light</span></a>
              <a href="#" class="dropdown-item js-set-theme-dark"><span>Dark</span></a>
              <a href="#" class="dropdown-item js-set-theme-auto"><span>Automatic</span></a>
            </div>
          </li>
        </ul>
      </div>
    </nav>
  </div>

  <div class="page-body">
    <span class="js-widget-page d-none"></span>
{{about_section}}
{{research_section}}
{{talks_section}}
{{experience_section}}
{{honors_section}}
{{teaching_section}}
{{miscellaneous_section}}
{{analytics_section}}
  </div>

  <footer class="site-footer">
    <p class="powered-by">{{footer_html}}</p>
  </footer>

  <script src="/js/vendor-bundle.min.b73dfaac3b6499dc997741748a7c3fe2.js"></script>
  <script src="/en/js/wowchemy.min.d6e4e6b6f26993a9f4895dc9a864ae34.js"></script>
</body>
</html>
